# ============================================================
# Smart Data Extractor - Docker Compose
# ============================================================

services:
  postgres:
    image: postgres:17
    container_name: smart-extractor-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-smart_extractor}
      - POSTGRES_USER=${POSTGRES_USER:-smart_extractor}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-smart_extractor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - smart-extractor-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_extractor} -d ${POSTGRES_DB:-smart_extractor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: smart-extractor:latest
    container_name: smart-extractor-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - SMART_EXTRACTOR_API_KEY=${SMART_EXTRACTOR_API_KEY:-}
      - SMART_EXTRACTOR_BASE_URL=${SMART_EXTRACTOR_BASE_URL:-}
      - SMART_EXTRACTOR_MODEL=${SMART_EXTRACTOR_MODEL:-}
      - SMART_EXTRACTOR_STARTUP_CHECK_ENABLED=${SMART_EXTRACTOR_STARTUP_CHECK_ENABLED:-}
      - SMART_EXTRACTOR_STARTUP_CHECK_VERIFY_MODEL=${SMART_EXTRACTOR_STARTUP_CHECK_VERIFY_MODEL:-}
      - SMART_EXTRACTOR_STARTUP_CHECK_TIMEOUT=${SMART_EXTRACTOR_STARTUP_CHECK_TIMEOUT:-}
      - SMART_EXTRACTOR_WEB_API_TOKEN=${SMART_EXTRACTOR_WEB_API_TOKEN:?SMART_EXTRACTOR_WEB_API_TOKEN is required}
      - SMART_EXTRACTOR_STORAGE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
      - SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
      - SMART_EXTRACTOR_CONFIG_SECRET_KEY=${SMART_EXTRACTOR_CONFIG_SECRET_KEY:-}
      - SMART_EXTRACTOR_AUTH_SECRET_KEY=${SMART_EXTRACTOR_AUTH_SECRET_KEY:-}
      - SMART_EXTRACTOR_BOOTSTRAP_ADMIN_PASSWORD=${SMART_EXTRACTOR_BOOTSTRAP_ADMIN_PASSWORD:-}
      - SMART_EXTRACTOR_WEB_TASK_DISPATCH_MODE=${SMART_EXTRACTOR_WEB_TASK_DISPATCH_MODE:-inline}
    volumes:
      - smart-extractor-output:/app/output
      - smart-extractor-logs:/app/logs
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: smart-extractor:latest
    profiles:
      - queue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SMART_EXTRACTOR_API_KEY=${SMART_EXTRACTOR_API_KEY:-}
      - SMART_EXTRACTOR_BASE_URL=${SMART_EXTRACTOR_BASE_URL:-}
      - SMART_EXTRACTOR_MODEL=${SMART_EXTRACTOR_MODEL:-}
      - SMART_EXTRACTOR_WEB_API_TOKEN=${SMART_EXTRACTOR_WEB_API_TOKEN:?SMART_EXTRACTOR_WEB_API_TOKEN is required}
      - SMART_EXTRACTOR_STORAGE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
      - SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
      - SMART_EXTRACTOR_CONFIG_SECRET_KEY=${SMART_EXTRACTOR_CONFIG_SECRET_KEY:-}
      - SMART_EXTRACTOR_AUTH_SECRET_KEY=${SMART_EXTRACTOR_AUTH_SECRET_KEY:-}
      - SMART_EXTRACTOR_WEB_TASK_DISPATCH_MODE=queue
      - SMART_EXTRACTOR_WEB_START_BUILTIN_WORKER=false
    volumes:
      - smart-extractor-output:/app/output
      - smart-extractor-logs:/app/logs
      - ./config:/app/config
    command: ["smart-extractor", "web-worker"]

  extractor:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: smart-extractor:latest
    profiles:
      - cli
    environment:
      - SMART_EXTRACTOR_API_KEY=${SMART_EXTRACTOR_API_KEY:-}
      - SMART_EXTRACTOR_BASE_URL=${SMART_EXTRACTOR_BASE_URL:-}
      - SMART_EXTRACTOR_MODEL=${SMART_EXTRACTOR_MODEL:-}
      - SMART_EXTRACTOR_STORAGE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
      - SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL=${SMART_EXTRACTOR_STORAGE_TASK_STORE_DATABASE_URL:-postgresql://${POSTGRES_USER:-smart_extractor}:${POSTGRES_PASSWORD:-smart_extractor}@postgres:5432/${POSTGRES_DB:-smart_extractor}}
    volumes:
      - smart-extractor-output:/app/output
      - smart-extractor-logs:/app/logs
      - ./config:/app/config
    entrypoint: ["smart-extractor"]
    command: ["--help"]

volumes:
  smart-extractor-output:
    driver: local
  smart-extractor-logs:
    driver: local
  smart-extractor-postgres:
    driver: local

llm:
  api_key: ""
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 4096
  max_retries: 3
  timeout: 60
fetcher:
  headless: true
  timeout: 30000
  wait_after_load: 2000
  viewport_width: 1920
  viewport_height: 1080
  locale: zh-CN
  timezone_id: Asia/Shanghai
  verify_ssl: true
  screenshot: false
  storage_state_path: output/playwright/state.json
  persistent_context_dir: output/playwright/profile
cleaner:
  remove_tags:
  - script
  - style
  - nav
  - footer
  - header
  - aside
  - iframe
  - noscript
  max_text_length: 8000
  keep_structure: true
storage:
  output_dir: output
  default_format: json
  sqlite_db_name: extracted_data.db
  csv_encoding: utf-8-sig
  sqlite_busy_timeout_ms: 5000
  sqlite_enable_wal: true
  sqlite_synchronous: NORMAL
scheduler:
  max_concurrency: 3
  request_delay_min: 1.0
  request_delay_max: 3.0
  max_retries: 2
log:
  level: INFO
  log_dir: logs
  rotation: 10 MB
  retention: 30 days
web:
  api_token: ''
  rate_limit_per_minute: 120
  allowed_hosts: []
  trusted_proxy_ips: []
  request_max_body_bytes: 1048576
  security_headers_enabled: true
  task_dispatch_mode: inline
  start_builtin_worker: false
  worker_poll_interval_seconds: 2.0
  worker_stale_after_seconds: 300.0
  monitor_scheduler_poll_interval_seconds: 15.0
  monitor_scheduler_batch_size: 5
  monitor_scheduler_lease_seconds: 120.0
  start_builtin_monitor_scheduler: true
  startup_check_enabled: true
  startup_check_verify_model: true
  startup_check_timeout: 15
